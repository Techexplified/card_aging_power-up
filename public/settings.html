<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 12px; font-family: -apple-system, sans-serif; }
    .row { margin-bottom: 12px; }
    @media (prefers-color-scheme: dark) {
      body { color: #b6c2cf; background-color: #282e33; }
      input[type="number"] { background: #22272b; color: white; border: 1px solid #738496; }
    }
  </style>
</head>
<body>
  <div class="row">
    <label><input type="checkbox" id="enableToggle" /> Enable Auto-Sweep to Stale List</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="ignoreStarterToggle" checked /> Ignore "Trello Starter Guide" list</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="hideBadgesToggle" /> Hide Age Badges (Front & Back)</label>
  </div>
  <div class="row">
    <label for="daysInput">Days Inactive before sweeping:</label>
    <input type="number" id="daysInput" value="30" style="width: 60px;" />
  </div>
  <button id="saveBtn" class="mod-primary">Save Settings</button>

  <script>
    // 🚨 PASTE YOUR API KEY HERE BETWEEN THE QUOTES
    const API_KEY = '8ff35f5f772805ddb9058e7b406afd00';

    var t = window.TrelloPowerUp.iframe({
      appKey: API_KEY,
      appName: 'Board Declutter'
    });

    t.render(function() {
      t.get('board', 'shared').then(function(data) {
        if (data) {
          document.getElementById('enableToggle').checked = data.sweepEnabled || false;
          document.getElementById('ignoreStarterToggle').checked = data.ignoreStarter !== false; 
          document.getElementById('hideBadgesToggle').checked = data.hideBadges || false; 
          document.getElementById('daysInput').value = data.sweepThreshold || 30;
        }
      });
    });

    // 🚀 UPDATED BULLETPROOF RESTORE LOGIC
    async function restoreCards() {
      try {
        let isAuth = await t.getRestApi().isAuthorized();
        
        // If Trello forgot the token, force the auth popup before trying to move cards
        if (!isAuth) {
          await t.getRestApi().authorize({ scope: 'read,write', expiration: '30days' });
        }

        const token = await t.getRestApi().getToken();
        const authStr = `key=${API_KEY}&token=${token}`;

        const lists = await t.lists('all');
        const staleList = lists.find(l => l.name.toLowerCase() === 'stale cards');
        if (!staleList) return; 

        // FALLBACK: If a card has no label, send it to the first list on the board
        const fallbackListId = lists[0].id; 

        const allCards = await t.cards('id', 'idList', 'labels');
        const cardsToRestore = allCards.filter(c => c.idList === staleList.id);

        for (const card of cardsToRestore) {
          let targetListId = fallbackListId; // Default to fallback
          let labelToRemoveId = null;

          // Try to find the original list from the label
          for (const label of card.labels) {
            const matchedList = lists.find(l => l.name === label.name);
            if (matchedList) {
              targetListId = matchedList.id;
              labelToRemoveId = label.id;
              break;
            }
          }

          // Move card (either to its original list, or the fallback list)
          await fetch(`https://api.trello.com/1/cards/${card.id}?idList=${targetListId}&${authStr}`, { method: 'PUT' });
          
          // Delete the label if we found one
          if (labelToRemoveId) {
            await fetch(`https://api.trello.com/1/cards/${card.id}/idLabels/${labelToRemoveId}?${authStr}`, { method: 'DELETE' });
          }
        }
      } catch (e) { console.error("Restore failed:", e); }
    }

    document.getElementById('saveBtn').addEventListener('click', async function() {
      const btn = document.getElementById('saveBtn');
      btn.textContent = "Saving...";
      btn.disabled = true;

      const isEnabled = document.getElementById('enableToggle').checked;
      const ignoreStarter = document.getElementById('ignoreStarterToggle').checked;
      const hideBadges = document.getElementById('hideBadgesToggle').checked;
      const days = parseInt(document.getElementById('daysInput').value, 10) || 30;

      const currentData = await t.get('board', 'shared') || {};
      const wasEnabled = currentData.sweepEnabled || false;

      // TRIGGER RESTORE IF UNCHECKED
      if (wasEnabled && !isEnabled) {
        btn.textContent = "Restoring Cards..."; 
        await restoreCards(); 
      }

      await t.set('board', 'shared', {
        ...currentData,
        'sweepEnabled': isEnabled,
        'ignoreStarter': ignoreStarter,
        'hideBadges': hideBadges, 
        'sweepThreshold': days
      });

      btn.textContent = "✔ Saved!";
      btn.style.backgroundColor = "#61bd4f";
      btn.style.color = "white";

      setTimeout(function() { try { t.closePopup(); } catch(e) {} }, 1000);
    });
  </script>
</body>
</html>
